<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>USRoutingNumber.com - Bank Routing Numbers</title>
    <!-- Deferred third-party scripts -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4ZFCTC3E7F');

      function loadThirdPartyScripts() {
        if (window.thirdPartyScriptsLoaded) return;
        window.thirdPartyScriptsLoaded = true;
        
        // Google Analytics
        const gaScript = document.createElement('script');
        gaScript.src = "https://www.googletagmanager.com/gtag/js?id=G-4ZFCTC3E7F";
        gaScript.async = true;
        document.head.appendChild(gaScript);

        // Google AdSense
        const adScript = document.createElement('script');
        adScript.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7380090598384677";
        adScript.async = true;
        adScript.crossOrigin = "anonymous";
        document.head.appendChild(adScript);
      }

      // Load on user interaction or delayed after load
      ['scroll', 'mousemove', 'touchstart', 'keydown'].forEach(evt => 
        window.addEventListener(evt, loadThirdPartyScripts, { once: true, passive: true })
      );
      
      window.addEventListener('load', () => {
        setTimeout(loadThirdPartyScripts, 7000); // 7s fallback after load
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
